<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script crossorigin src="https://unpkg.com/axios/dist/axios.min.js"></script>
    
</head>
<body>
    <div id="root"></div>

    <script>

        const API_URL = 'https://jsonplaceholder.typicode.com/users';

        async function callApiWithFetch() {
            try {
                const response = await fetch(API_URL);
                // fetch는 if(!response.ok) 꼭 있어야 함 (http 에러를 reject로 잡지 못하기 때문에)
                const data = await response.json(); // .json()으로 직접 파싱
                console.log(data);
            } catch (error) {
                console.error(error);
            }
        }


        // axios 사용
        async function callApiWithAxios() {
            try {
                const response = await axios.get(API_URL); // .get(), .post() 등 직관적 메소드 사용
                const data = response.data; // json 파싱이 자동으로 되어 response.data에 담겨있다
                console.log('axios data: ', data);
                console.log('axios response', response);
            } catch (error) {
                console.error(error);
            }
        }

        callApiWithFetch();
        callApiWithAxios();
    </script>
    
</body>
</html>
