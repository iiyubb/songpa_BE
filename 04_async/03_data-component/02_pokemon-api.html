<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .item {
            background-color: white;
            border: 1px solid black;
            margin: 0;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">

        const API_URL = 'https://pokeapi.co/api/v2/pokemon';

        const {useEffect, useState} = React;

        function Title() {
            return <h1>포켓몬 목록</h1>;
        }

        function ItemList() {
            const [pokemons, setPokemons] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                async function fetchPokemons() {
                    try {
                        const response = await fetch(API_URL);
                        const data = await response.json();
                        
                        const detailPromises = data.results.map(pokemon => 
                            fetch(pokemon.url).then(res => {
                                if (!res.ok) throw new Error('정보를 가져올 수 없습니다.');
                                return res.json()
                            })
                        );
                        const detailedPokemons = await Promise.all(detailPromises); // 순서가 보장됨. 하나라도 실패하면 전체가 실패로 처리됨
                        /* 참고: Promise.all()은 배열 안 Promise 중 하나라도 reject 되면 전체가 reject 됨 
                                일부가 실패해도 나머지는 계속 처리하고 싶다면 Promise.addSettled() 사용 */
                        
                        setPokemons(detailedPokemons);

                    } catch (error) {
                        console.error(error);
                        setError(error);
                    } finally {
                        setLoading(false);
                    }
                }
                fetchPokemons();
            }, []);
                
            if (loading) return <p>로딩 중...</p>;
            if (error) return <p>오류가 발생했습니다: {error.message}</p>;

            return (
                <>
                    {pokemons.map(pokemon => <Card key={pokemon.id} pokemon={pokemon}/>)}
                </>
            );
        }

        function Card({pokemon}) {
            return (
                <div className='card'>
                    <img src={pokemon.sprites.other.dream_world.front_default} alt={pokemon.name}/>
                    <div className='info'>
                        <h2>No. {pokemon.id}</h2>
                        <h3>name: {pokemon.name}</h3>
                    </div>
                </div>
            )
        }

        function Item({pokemon}) {
            return (
                <div className="item">
                    <div style={{display: 'flex', alignItems: 'center', gap: '10px'}}>
                        <img 
                            src={pokemon.sprites.other.dream_world.front_default} 
                            alt={pokemon.name}
                            width="80" height="80"
                        />
                        <div>
                            <h4>No.{pokemon.id}</h4>
                            <h4>{pokemon.name}</h4>
                        </div>
                    </div>
                </div>
            );
        }

        function App () {
            return (
                <>
                    <Title />
                    <ItemList />
                </>
            )
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);

    </script>
</body>
</html>
